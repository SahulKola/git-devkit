<a class="skip-link" href="#main-content">Skip to main content</a>
<app-header />
@if (isRouteLoading()) {
<div class="route-loader-overlay" role="status" aria-live="polite" aria-label="Loading next page">
  <div class="git-loader" aria-hidden="true">
    <div class="dag-loader">
      <svg viewBox="0 0 180 90" class="dag-svg" focusable="false">
        <line x1="24" y1="56" x2="88" y2="56" class="dag-edge" />
        <line x1="88" y1="56" x2="128" y2="56" class="dag-edge" />
        <line x1="128" y1="56" x2="164" y2="56" class="dag-edge" />
        <line x1="88" y1="56" x2="112" y2="32" class="dag-edge" />
        <line x1="112" y1="32" x2="128" y2="56" class="dag-edge" />

        <circle cx="24" cy="56" r="5" class="dag-node" />
        <circle cx="88" cy="56" r="5" class="dag-node" />
        <circle cx="112" cy="32" r="5" class="dag-node dag-node--feature" />
        <circle cx="128" cy="56" r="5.2" class="dag-node dag-node--merge" />
        <circle cx="164" cy="56" r="5.2" class="dag-node dag-node--head" />
      </svg>
      <span class="dag-activity-dot" aria-hidden="true"></span>
      <span class="branch-tag branch-tag--feature">FEATURE</span>
      <span class="branch-tag branch-tag--head">HEAD</span>
    </div>
  </div>
</div>
}
<main id="main-content" tabindex="-1" [attr.aria-busy]="isRouteLoading() ? 'true' : 'false'">
  <router-outlet />
</main>
<app-footer />
