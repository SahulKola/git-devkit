<header class="header">
  <div class="container">
    <a routerLink="/" class="logo" (click)="closeMenu()"><span class="git-brand">git</span>-devkit</a>

    <div class="desktop-nav">
      <nav class="nav" aria-label="Primary">
        <ul class="nav-root">
          <li class="nav-item">
            <a routerLink="/installation" routerLinkActive="active">Git Multi SSH</a>
          </li>
          <li class="nav-item nav-item-group">
            <button type="button" class="nav-trigger" aria-haspopup="true">
              Commands
              <svg class="chevron" viewBox="0 0 10 6" aria-hidden="true" focusable="false">
                <path d="M1 1l4 4 4-4" />
              </svg>
            </button>
            <ul class="nav-submenu" aria-label="Commands">
              <li><a routerLink="/aliases" routerLinkActive="active" (click)="closeActiveNav()">Aliases</a></li>
              <li><a routerLink="/commits" routerLinkActive="active" (click)="closeActiveNav()">Commits</a></li>
            </ul>
          </li>
          <li class="nav-item nav-item-group">
            <button type="button" class="nav-trigger" aria-haspopup="true">
              Workflow
              <svg class="chevron" viewBox="0 0 10 6" aria-hidden="true" focusable="false">
                <path d="M1 1l4 4 4-4" />
              </svg>
            </button>
            <ul class="nav-submenu" aria-label="Workflow">
              <li><a routerLink="/workflows" routerLinkActive="active" (click)="closeActiveNav()">Workflows</a></li>
              <li><a routerLink="/branching" routerLinkActive="active" (click)="closeActiveNav()">Branching</a></li>
            </ul>
          </li>
          <li class="nav-item nav-item-group">
            <button type="button" class="nav-trigger" aria-haspopup="true">
              Learning
              <svg class="chevron" viewBox="0 0 10 6" aria-hidden="true" focusable="false">
                <path d="M1 1l4 4 4-4" />
              </svg>
            </button>
            <ul class="nav-submenu" aria-label="Learning">
              <li><a routerLink="/stories" routerLinkActive="active" (click)="closeActiveNav()">Stories</a></li>
              <li><a routerLink="/bytes" routerLinkActive="active" (click)="closeActiveNav()">Bytes</a></li>
            </ul>
          </li>
          <li class="nav-item nav-item-github">
            <a class="github-link" href="https://github.com/sahulkola/git-multi-ssh" target="_blank" rel="noopener"
              aria-label="GitHub repository, opens in a new tab">
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path
                  d="M8 0C3.58 0 0 3.73 0 8.33c0 3.67 2.29 6.78 5.47 7.88.4.08.55-.18.55-.4 0-.2-.01-.86-.01-1.57-2.01.45-2.53-.51-2.69-.98-.09-.25-.48-.98-.81-1.18-.27-.15-.66-.53-.01-.54.61-.01 1.04.58 1.18.82.7 1.24 1.82.89 2.27.68.07-.52.27-.89.49-1.09-1.78-.21-3.64-.92-3.64-4.1 0-.91.31-1.65.82-2.24-.08-.21-.36-1.05.08-2.19 0 0 .67-.22 2.2.86A7.28 7.28 0 0 1 8 3.4c.65 0 1.3.09 1.91.27 1.53-1.08 2.2-.86 2.2-.86.44 1.14.16 1.98.08 2.19.51.59.82 1.33.82 2.24 0 3.19-1.87 3.89-3.65 4.1.29.26.54.76.54 1.53 0 1.1-.01 1.99-.01 2.26 0 .22.14.49.55.4A8.35 8.35 0 0 0 16 8.33C16 3.73 12.42 0 8 0Z" />
              </svg>
              <span>GitHub</span>
            </a>
          </li>
        </ul>
      </nav>
      <button class="theme-toggle" (click)="themeService.toggle()"
        [attr.aria-label]="'Switch to ' + (themeService.theme() === 'dark' ? 'light' : 'dark') + ' mode'">
        @if (themeService.theme() === 'dark') { ☀ } @else { ☽ }
      </button>
    </div>

    <div class="mobile-actions">
      <button class="theme-toggle" (click)="themeService.toggle()"
        [attr.aria-label]="'Switch to ' + (themeService.theme() === 'dark' ? 'light' : 'dark') + ' mode'">
        @if (themeService.theme() === 'dark') { ☀ } @else { ☽ }
      </button>
      <button class="hamburger" [class.open]="menuOpen()" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()"
        [attr.aria-controls]="mobileMenuId" aria-label="Toggle primary navigation menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" [class.open]="menuOpen()" [attr.aria-hidden]="!menuOpen()" [attr.id]="mobileMenuId"
    aria-label="Primary mobile">
    <ul class="mobile-list">
      <li><a routerLink="/installation" routerLinkActive="active" (click)="closeMenu()">Git Multi SSH</a></li>
      <li class="mob-group" [class.mob-group--open]="openMobileGroup() === 'identity'">
        <button type="button" class="mob-label" (click)="toggleMobileGroup('identity')"
          [attr.aria-expanded]="openMobileGroup() === 'identity'" aria-controls="mob-identity">
          Commands
          <svg class="mob-chevron" viewBox="0 0 10 6" aria-hidden="true" focusable="false">
            <path d="M1 1l4 4 4-4" />
          </svg>
        </button>
        <ul id="mob-identity">
          <li><a routerLink="/aliases" routerLinkActive="active" (click)="closeMenu()">Aliases</a></li>
          <li><a routerLink="/commits" routerLinkActive="active" (click)="closeMenu()">Commits</a></li>
        </ul>
      </li>
      <li class="mob-group" [class.mob-group--open]="openMobileGroup() === 'flow'">
        <button type="button" class="mob-label" (click)="toggleMobileGroup('flow')"
          [attr.aria-expanded]="openMobileGroup() === 'flow'" aria-controls="mob-flow">
          Workflow
          <svg class="mob-chevron" viewBox="0 0 10 6" aria-hidden="true" focusable="false">
            <path d="M1 1l4 4 4-4" />
          </svg>
        </button>
        <ul id="mob-flow">
          <li><a routerLink="/workflows" routerLinkActive="active" (click)="closeMenu()">Workflows</a></li>
          <li><a routerLink="/branching" routerLinkActive="active" (click)="closeMenu()">Branching</a></li>
        </ul>
      </li>
      <li class="mob-group" [class.mob-group--open]="openMobileGroup() === 'learn'">
        <button type="button" class="mob-label" (click)="toggleMobileGroup('learn')"
          [attr.aria-expanded]="openMobileGroup() === 'learn'" aria-controls="mob-learn">
          Learning
          <svg class="mob-chevron" viewBox="0 0 10 6" aria-hidden="true" focusable="false">
            <path d="M1 1l4 4 4-4" />
          </svg>
        </button>
        <ul id="mob-learn">
          <li><a routerLink="/stories" routerLinkActive="active" (click)="closeMenu()">Stories</a></li>
          <li><a routerLink="/bytes" routerLinkActive="active" (click)="closeMenu()">Bytes</a></li>
        </ul>
      </li>
      <li class="mobile-github">
        <a href="https://github.com/sahulkola/git-multi-ssh" target="_blank" rel="noopener"
          aria-label="GitHub repository, opens in a new tab" (click)="closeMenu()"><span class="gh-icon"
            aria-hidden="true"><svg viewBox="0 0 16 16" focusable="false">
              <path
                d="M8 0C3.58 0 0 3.73 0 8.33c0 3.67 2.29 6.78 5.47 7.88.4.08.55-.18.55-.4 0-.2-.01-.86-.01-1.57-2.01.45-2.53-.51-2.69-.98-.09-.25-.48-.98-.81-1.18-.27-.15-.66-.53-.01-.54.61-.01 1.04.58 1.18.82.7 1.24 1.82.89 2.27.68.07-.52.27-.89.49-1.09-1.78-.21-3.64-.92-3.64-4.1 0-.91.31-1.65.82-2.24-.08-.21-.36-1.05.08-2.19 0 0 .67-.22 2.2.86A7.28 7.28 0 0 1 8 3.4c.65 0 1.3.09 1.91.27 1.53-1.08 2.2-.86 2.2-.86.44 1.14.16 1.98.08 2.19.51.59.82 1.33.82 2.24 0 3.19-1.87 3.89-3.65 4.1.29.26.54.76.54 1.53 0 1.1-.01 1.99-.01 2.26 0 .22.14.49.55.4A8.35 8.35 0 0 0 16 8.33C16 3.73 12.42 0 8 0Z" />
            </svg></span> GitHub Repository</a>
      </li>
    </ul>
  </nav>
</header>
